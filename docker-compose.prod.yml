# Adyton — standalone production compose for Coolify.
# NOT an overlay over docker-compose.yml — use this file directly:
#   docker compose -f docker-compose.prod.yml up -d
#
# DB and Redis are Coolify-managed resources (not defined here).
# Routing is handled by Coolify/Caddy — no Traefik labels needed.
# All secrets come from env vars set in the Coolify dashboard.
#
# STAGING: set RUN_MIGRATIONS=true so main.ts applies pending migrations on boot.
# PROD: leave RUN_MIGRATIONS unset (false). Extract SQL manually:
#   pnpm --filter @adyton/api migration:sql
name: adyton

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-false}
      COOKIE_SAMESITE: strict
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TOTP_ENC_KEY: ${TOTP_ENC_KEY}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-localhost}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-http://localhost:30000}
      ENABLE_POW: ${ENABLE_POW:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 512m

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL}
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  coolify:
    external: true
