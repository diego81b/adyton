# Adyton — dev overlay.
# Adds api + web services with bind-mounted source for HMR, dev Dockerfiles,
# host port mappings (web :30000, api :30001), and dev-only env (lax cookies,
# permissive CORS). Combine with the base file:
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
#
# Dev/prod parity note: cross-origin localhost:30000 → localhost:30001 forces
# refresh-token cookies to SameSite=Lax in dev (prod uses Strict behind a
# single origin via Traefik). COOKIE_SAMESITE env var threads this through.
services:
  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://adyton:${POSTGRES_PASSWORD:-devpassword}@db:5432/adyton
      REDIS_URL: redis://redis:6379
      JWT_PRIVATE_KEY_PATH: /run/secrets/jwt_private_key
      JWT_PUBLIC_KEY_PATH: /run/secrets/jwt_public_key
      TOTP_ENC_KEY_PATH: /run/secrets/totp_enc_key
      NODE_ENV: development
      PORT: "3001"
      # Dev migrates via the container command (dev:migrate → mikro-orm CLI on src), so
      # main.ts must NOT also try (it reads the watch-compiled dist, which can be stale).
      RUN_MIGRATIONS: "false"
      ALLOWED_ORIGINS: http://localhost:30000
      COOKIE_SAMESITE: lax
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/api/node_modules
    ports:
      - "30001:3001"
    secrets:
      - jwt_private_key
      - jwt_public_key
      - totp_enc_key

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    restart: unless-stopped
    depends_on:
      api: { condition: service_started }
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://localhost:30001
      NODE_ENV: development
      HOST: 0.0.0.0
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "500"
    volumes:
      - ./apps/web:/app/apps/web
      - ./packages:/app/packages
      - /app/node_modules
      - /app/apps/web/node_modules
    ports:
      - "30000:3000"
