name: Deploy

on:
  push:
    branches:
      - staging       # → staging Coolify instance
    tags:
      - "v*"          # → production Coolify instance

jobs:
  test:
    name: Tests (pre-deploy gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:coverage

      - name: Integration tests
        env:
          TOTP_ENC_KEY: ${{ secrets.TOTP_ENC_KEY }}
          JWT_PRIVATE_KEY: ${{ secrets.JWT_PRIVATE_KEY }}
          JWT_PUBLIC_KEY: ${{ secrets.JWT_PUBLIC_KEY }}
        working-directory: apps/api
        run: pnpm test:int

  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_type == 'branch' && github.ref_name == 'staging'
    steps:
      - name: Trigger Coolify staging rebuild
        run: curl -fSs "${{ secrets.COOLIFY_WEBHOOK_STAGING }}"

  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - name: Trigger Coolify production rebuild
        run: curl -fSs "${{ secrets.COOLIFY_WEBHOOK_PROD }}"
