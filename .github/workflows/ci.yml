name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  typecheck-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:coverage

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # JWT keys for tests are ephemeral and throwaway — generate them per run instead of
      # injecting GitHub secrets. auth.module loads the key at import time (before any test
      # sets JWT_*_KEY_PATH), so loadPrivateKey/loadPublicKey fall through to the priority-3
      # default path: secrets/dev/*.pem. Generate exactly there. Do NOT set JWT_PRIVATE_KEY /
      # JWT_PUBLIC_KEY env: those take priority and a malformed multiline secret breaks RS256.
      - name: Generate ephemeral JWT test keys
        run: |
          mkdir -p secrets/dev
          openssl genrsa -out secrets/dev/jwt_private.pem 4096
          openssl rsa -in secrets/dev/jwt_private.pem -pubout -out secrets/dev/jwt_public.pem

      - name: Run integration tests
        env:
          TOTP_ENC_KEY: ${{ secrets.TOTP_ENC_KEY }}
        working-directory: apps/api
        run: pnpm test:int

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit
        run: pnpm audit --audit-level=high
