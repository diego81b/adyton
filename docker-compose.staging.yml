# Adyton — standalone staging compose for Coolify.
# NOT an overlay over docker-compose.yml — use this file directly:
#   docker compose -f docker-compose.staging.yml up -d
#
# DB and Redis are Coolify-managed resources (not defined here).
# Routing is handled by Coolify/Traefik. Port labels are required because
# Traefik runs with exposedbydefault=false; Coolify injects router rules
# (domain/TLS) at deploy time on top of these labels.
# All secrets come from env vars set in the Coolify dashboard.
#
# Migrations run automatically on every boot (RUN_MIGRATIONS=true).
# For prod, use docker-compose.prod.yml and apply migrations manually.
name: adyton

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adyton-api.rule=Host(`api-adyton.diegobaldeschi.dev`)"
      - "traefik.http.routers.adyton-api.entrypoints=https"
      - "traefik.http.routers.adyton-api.tls=true"
      - "traefik.http.routers.adyton-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adyton-api.service=adyton-api"
      - "traefik.http.services.adyton-api.loadbalancer.server.port=3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      RUN_MIGRATIONS: "true"
      COOKIE_SAMESITE: strict
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY}
      TOTP_ENC_KEY: ${TOTP_ENC_KEY}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN}
      ENABLE_POW: ${ENABLE_POW:-false}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 512m

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runner
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.adyton-web.rule=Host(`adyton.diegobaldeschi.dev`)"
      - "traefik.http.routers.adyton-web.entrypoints=https"
      - "traefik.http.routers.adyton-web.tls=true"
      - "traefik.http.routers.adyton-web.tls.certresolver=letsencrypt"
      - "traefik.http.routers.adyton-web.service=adyton-web"
      - "traefik.http.services.adyton-web.loadbalancer.server.port=3000"
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - coolify
    deploy:
      resources:
        limits:
          memory: 256m

networks:
  coolify:
    external: true
